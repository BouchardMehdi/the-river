<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#050d13" />
    <title>THE RIVER - Hors ligne</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Arial, sans-serif;
        background: #050d13;
        color: #fff8e9;
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        margin: 0;
        padding: 24px;
        background:
          radial-gradient(circle at 50% 20%, rgba(216, 168, 79, 0.18), transparent 34%),
          #050d13;
      }

      main {
        width: min(520px, 100%);
        display: grid;
        gap: 14px;
        padding: 28px;
        border: 1px solid rgba(216, 168, 79, 0.24);
        border-radius: 8px;
        background: rgba(6, 14, 21, 0.94);
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.32);
      }

      h1 {
        margin: 0;
        font-size: 34px;
      }

      p {
        margin: 0;
        color: #c5d0d1;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Connexion perdue</h1>
      <p>THE RIVER est installe, mais les tables et credits ont besoin du serveur pour rester synchronises.</p>
    </main>
  </body>
</html>
